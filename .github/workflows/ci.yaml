name: CI - Pipeline Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- SETUP PYTHON ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # --- SETUP NODE/REACT ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend dependencies
        # Garantindo que ele entre na pasta frontend
        run: npm install
        working-directory: ./frontend

      # --- ORQUESTRAÇÃO E TESTES ---
      - name: Start Servers and Run Tests
        env:
          # Chaves fakes para o api.py passar na validação inicial
          GOOGLE_API_KEY: "fake_key_for_testing"
          GROQ_API_KEY: "fake_key_for_testing"
        run: |
          # 1. Backend em Background (raiz)
          python -m uvicorn src.api:app --host 0.0.0.0 --port 8000 &

          # 2. Frontend em Background (entra na pasta e sobe)
          cd frontend && npm run dev -- --port 5173 &

          # 3. Aguarda os serviços (aumentamos para 2 minutos por segurança no CI)
          npx wait-on http://localhost:5173 http://localhost:8000 -t 120000

          # 4. Executa a bateria de testes
          python -m pytest
