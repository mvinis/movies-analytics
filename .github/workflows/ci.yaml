name: CI - Pipeline Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- SETUP PYTHON ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # --- SETUP NODE/REACT ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Frontend dependencies
        # Garantindo que ele entre na pasta frontend
        run: npm install
        working-directory: ./frontend

      # --- ORQUESTRAÇÃO DE SERVIDORES ---
      - name: Start Servers and Run Tests
        env:
          GOOGLE_API_KEY: "fake_key_for_testing"
          GROQ_API_KEY: "fake_key_for_testing"
        run: |
          # 1. Backend
          python -m uvicorn src.api:app --host 0.0.0.0 --port 8000 &

          # 2. Frontend
          cd frontend && npm run dev -- --port 5173 &

          # 3. Aguarda os dois (agora aceitando 200 ou 404)
          # O parâmetro --httpStatusCode 200,404 é o "pulo do gato"
          npx wait-on http://localhost:8000 http://localhost:5173 -t 120000 --httpStatusCode 200,404

          # 4. Executa os testes
          python -m pytest
