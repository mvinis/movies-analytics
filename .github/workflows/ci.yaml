name: CI - Pipeline Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint with flake8 (Opcional - Qualidade de código)
        run: |
          pip install flake8
          flake8 src --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test Docker Build (Backend)
        run: docker build -t movie-backend -f backend.Dockerfile .

      - name: Test Docker Build (Frontend)
        run: docker build -t movie-frontend -f frontend.Dockerfile .
