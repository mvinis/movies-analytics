name: CI - Pipeline Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # --- SETUP PYTHON ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps

      # --- SETUP NODE/REACT ---
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install Frontend dependencies
        # Garantindo que ele entre na pasta frontend
        run: npm install
        working-directory: ./frontend

      # --- GERAÇÃO DE DADOS PARA O TESTE ---
      - name: Run Data Pipeline
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: python src/run_pipeline.py

      # --- ORQUESTRAÇÃO DE SERVIDORES ---
      - name: Start Servers and Run Tests
        env:
          GOOGLE_API_KEY: "fake_key_for_testing"
          GROQ_API_KEY: "fake_key_for_testing"
        run: |
          # 1. Backend (Raiz)
          python -m uvicorn src.api:app --host 0.0.0.0 --port 8000 &

          # 2. Frontend (Pasta frontend)
          cd frontend && npm run dev -- --port 5173 &

          # 3. Aguarda apenas a abertura das PORTAS (tcp:8000 e tcp:5173)
          # Usar 'tcp:' ignora se o status é 200, 404 ou 405. Só quer saber se o processo ligou.
          npx wait-on tcp:8000 tcp:5173 -t 120000

          # 4. Roda os testes
          python -m pytest
